<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #08080d;
    --surface: #12121e;
    --surface-hover: #1c1c32;
    --accent: #7c5cfc;
    --accent-soft: rgba(124,92,252,.10);
    --accent-glow: rgba(124,92,252,.30);
    --gold: #f59e0b;
    --green: #22c55e;
    --green-glow: rgba(34,197,94,.25);
    --red: #ef4444;
    --text: #f0f0f5;
    --text-muted: #8888a4;
    --border: rgba(255,255,255,.06);
    --radius: 16px;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 1.5rem;
    background-image:
      radial-gradient(ellipse 90% 50% at 50% -5%, rgba(124,92,252,.10), transparent),
      radial-gradient(ellipse 50% 40% at 80% 110%, rgba(34,197,94,.05), transparent);
    -webkit-font-smoothing: antialiased;
  }

  #app {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.1rem;
    flex: 1;
  }

  /* ---------- PERFIL ---------- */
  .profile { display: flex; flex-direction: column; align-items: center; gap: .5rem; margin-bottom: .25rem; }

  .avatar-wrap { position: relative; width: 105px; height: 105px; }

  .avatar-ring {
    width: 100%; height: 100%;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, var(--accent), var(--green));
    box-shadow: 0 0 30px var(--accent-glow);
  }

  .avatar-ring img {
    width: 100%; height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--bg);
    display: block;
  }

  .online-dot {
    position: absolute; bottom: 6px; right: 6px;
    width: 16px; height: 16px;
    background: var(--green);
    border: 3px solid var(--bg);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--green-glow);
    animation: pulse-dot 2s ease infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 8px var(--green-glow); }
    50%      { box-shadow: 0 0 16px var(--green-glow); }
  }

  .profile h1 { font-size: 1.45rem; font-weight: 800; letter-spacing: -.02em; display: flex; align-items: center; gap: 6px; }

  .badge-verified {
    width: 20px; height: 20px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .badge-verified svg { width: 12px; height: 12px; }

  .profile .tagline {
    color: var(--text-muted);
    font-size: .82rem;
    text-align: center;
    max-width: 300px;
    line-height: 1.55;
  }

  /* ---------- PROVA SOCIAL ---------- */
  .social-proof {
    display: flex; align-items: center; gap: .5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: .4rem .9rem;
    font-size: .72rem;
    color: var(--text-muted);
  }

  .stars { color: var(--gold); letter-spacing: 1px; font-size: .8rem; }
  .social-proof strong { color: var(--text); }

  /* ---------- OFERTA DESTAQUE ---------- */
  .offer {
    width: 100%;
    background: linear-gradient(145deg, rgba(34,197,94,.08), rgba(124,92,252,.06));
    border: 1px solid rgba(34,197,94,.20);
    border-radius: var(--radius);
    padding: 1.15rem 1.2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .offer::before {
    content: '';
    position: absolute; top: -40%; left: -20%;
    width: 140%; height: 80%;
    background: radial-gradient(ellipse, rgba(34,197,94,.06), transparent 70%);
    pointer-events: none;
  }

  .offer-top { display: flex; align-items: center; justify-content: center; gap: .5rem; margin-bottom: .6rem; }

  .offer-badge {
    background: var(--green); color: #000;
    font-size: .6rem; font-weight: 800;
    text-transform: uppercase; letter-spacing: .08em;
    padding: .22rem .65rem; border-radius: 100px;
  }

  .offer-timer {
    font-size: .65rem; color: var(--red); font-weight: 600;
    animation: blink 1.5s ease infinite;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

  .offer h2 { font-size: 1rem; font-weight: 700; margin-bottom: .2rem; position: relative; }
  .offer .offer-sub { font-size: .78rem; color: var(--text-muted); margin-bottom: .7rem; position: relative; }

  .price-row {
    display: flex; align-items: baseline; justify-content: center;
    gap: .4rem; margin-bottom: .75rem; position: relative;
  }

  .price-old { font-size: .8rem; color: var(--text-muted); text-decoration: line-through; }
  .price-new { font-size: 1.35rem; font-weight: 900; color: var(--green); }

  .btn-offer {
    display: flex; align-items: center; justify-content: center; gap: .5rem;
    width: 100%; padding: .9rem 1.5rem;
    background: var(--green); color: #000;
    font-weight: 800; font-size: .92rem;
    border: none; border-radius: 12px;
    cursor: pointer; text-decoration: none;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 4px 20px var(--green-glow);
    position: relative;
    font-family: inherit;
  }

  .btn-offer:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 30px var(--green-glow); }
  .btn-offer:active { transform: translateY(0) scale(.99); }

  /* ---------- SECOES E LINKS ---------- */
  .section-label {
    width: 100%; display: flex; align-items: center; gap: .6rem;
    font-size: .65rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: .1em;
    color: var(--text-muted); margin-top: .4rem;
  }

  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .links { width: 100%; display: flex; flex-direction: column; gap: .65rem; }

  .link-btn {
    display: flex; align-items: center; gap: .7rem;
    width: 100%; padding: .9rem 1.1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: .88rem; font-weight: 600;
    text-decoration: none;
    transition: all .25s ease;
    cursor: pointer; position: relative; overflow: hidden;
  }

  .link-btn::after {
    content: ''; position: absolute; inset: 0; opacity: 0;
    background: linear-gradient(135deg, rgba(124,92,252,.06), transparent);
    transition: opacity .25s;
  }

  .link-btn:hover {
    transform: translateY(-2px) scale(1.01);
    border-color: rgba(124,92,252,.25);
    box-shadow: 0 8px 24px rgba(0,0,0,.3), 0 0 0 1px rgba(124,92,252,.12);
  }

  .link-btn:hover::after { opacity: 1; }
  .link-btn:active { transform: translateY(0) scale(.99); }

  .link-btn.highlight {
    border-color: rgba(37,211,102,.20);
    background: linear-gradient(135deg, rgba(37,211,102,.06), var(--surface));
  }

  .link-icon {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px; flex-shrink: 0;
    position: relative; z-index: 1;
  }

  .link-icon svg { width: 19px; height: 19px; }

  .link-info { display: flex; flex-direction: column; gap: .1rem; position: relative; z-index: 1; flex: 1; min-width: 0; }
  .link-name { line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .link-sub  { font-size: .68rem; font-weight: 400; color: var(--text-muted); }

  .link-badge {
    font-size: .58rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .05em;
    padding: .2rem .55rem; border-radius: 100px;
    position: relative; z-index: 1; flex-shrink: 0; white-space: nowrap;
  }

  .link-badge.verde    { background: rgba(34,197,94,.15); color: var(--green); }
  .link-badge.vermelho { background: rgba(239,68,68,.15); color: var(--red); }
  .link-badge.roxo     { background: rgba(124,92,252,.15); color: var(--accent); }

  .link-arrow {
    opacity: .25; transition: opacity .25s, transform .25s;
    position: relative; z-index: 1; flex-shrink: 0;
  }

  .link-btn:hover .link-arrow { opacity: .6; transform: translateX(3px); }

  /* ---------- RODAPE ---------- */
  footer {
    margin-top: 2rem; padding-top: 1.25rem;
    border-top: 1px solid var(--border);
    width: 100%; max-width: 420px;
    display: flex; flex-direction: column;
    align-items: center; gap: .85rem;
  }

  .social-icons { display: flex; gap: .6rem; }

  .social-icons a {
    width: 42px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    transition: all .25s;
  }

  .social-icons a:hover {
    color: var(--text);
    border-color: rgba(124,92,252,.25);
    background: var(--surface-hover);
    transform: translateY(-2px);
  }

  .social-icons a svg { width: 18px; height: 18px; fill: currentColor; }

  .footer-text { font-size: .68rem; color: var(--text-muted); opacity: .4; }

  /* ---------- ANIMACOES ---------- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .anim { opacity: 0; animation: fadeUp .45s ease forwards; }

  /* ---------- RESPONSIVO ---------- */
  @media (max-width: 480px) {
    body { padding: 1.5rem .75rem 1rem; }
    .avatar-wrap { width: 90px; height: 90px; }
    .profile h1 { font-size: 1.3rem; }
    .link-btn { padding: .8rem .95rem; font-size: .85rem; }
    .link-icon { width: 33px; height: 33px; }
    .link-icon svg { width: 17px; height: 17px; }
  }

  /* ---------- PAINEL ANALYTICS ---------- */
  .panel-overlay {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    overflow-y: auto; padding: 1.5rem;
    justify-content: center; align-items: flex-start;
  }

  .panel-overlay.open { display: flex; }

  .panel {
    width: 100%; max-width: 520px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.5rem;
    margin-top: 2rem;
  }

  .panel h2 { font-size: 1.1rem; font-weight: 800; margin-bottom: .15rem; }
  .panel .panel-sub { font-size: .72rem; color: var(--text-muted); margin-bottom: 1.2rem; }

  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: .6rem; margin-bottom: 1.2rem;
  }

  .stat {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 12px; padding: .8rem .7rem; text-align: center;
  }

  .stat-val { font-size: 1.4rem; font-weight: 900; color: var(--accent); }
  .stat-lbl { font-size: .62rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-top: .2rem; }

  .tbl { width: 100%; border-collapse: collapse; }

  .tbl th {
    text-align: left; font-size: .65rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: .05em;
    color: var(--text-muted); padding: .5rem .4rem;
    border-bottom: 1px solid var(--border);
  }

  .tbl td { padding: .55rem .4rem; font-size: .82rem; border-bottom: 1px solid var(--border); }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl .tn { font-weight: 600; }
  .tbl .tc { font-weight: 800; color: var(--accent); text-align: right; }
  .tbl .tp { font-size: .7rem; color: var(--text-muted); text-align: right; width: 55px; }

  .bar-wrap { width: 100%; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; margin-top: .2rem; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .4s ease; }

  .panel-btns { display: flex; gap: .5rem; margin-top: 1rem; }

  .panel-btn {
    flex: 1; padding: .6rem;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--bg); color: var(--text);
    font-size: .75rem; font-weight: 600;
    cursor: pointer; transition: all .2s;
    font-family: inherit;
  }

  .panel-btn:hover { border-color: rgba(124,92,252,.3); background: var(--surface-hover); }
  .panel-btn.danger { color: var(--red); border-color: rgba(239,68,68,.2); }
  .panel-btn.danger:hover { background: rgba(239,68,68,.08); }
</style>

  var ICON_COLORS = {
    whatsapp:  { bg: 'rgba(37,211,102,.12)',  fill: '#25d366' },
    instagram: { bg: 'rgba(225,48,108,.12)',  fill: '#e1306c' },
    youtube:   { bg: 'rgba(255,0,0,.10)',     fill: '#ff0000' },
    tiktok:    { bg: 'rgba(0,0,0,.15)',       fill: '#f0f0f5' },
    curso:     { bg: 'rgba(124,92,252,.10)',  fill: '#7c5cfc' },
    ebook:     { bg: 'rgba(245,158,11,.10)',  fill: '#f59e0b' },
    grupo:     { bg: 'rgba(168,85,247,.10)',  fill: '#a855f7' },
    telegram:  { bg: 'rgba(0,136,204,.12)',   fill: '#0088cc' },
    site:      { bg: 'rgba(124,92,252,.10)',  fill: '#7c5cfc' },
    email:     { bg: 'rgba(239,68,68,.10)',   fill: '#ef4444' }
  };

  // ---- Gerar SVG ----
  function svg(name, size) {
    size = size || 24;
    return '<svg viewBox="0 0 24 24" width="' + size + '" height="' + size + '">' + (ICONS[name] || '') + '</svg>';
  }

  // ---- Construir pagina a partir do CONFIG ----
  function render() {
    var c = window.CONFIG;
    var h = '';
    var delay = 0;

    // Atualizar meta tags
    document.title = c.nome + ' | Links Oficiais';
    setMeta('description', 'Links oficiais de ' + c.nome + '. ' + c.descricao);
    setMeta('og:title', c.nome + ' | Links Oficiais');
    setMeta('og:description', c.descricao);

    // Perfil
    h += '<div class="profile anim" style="animation-delay:' + (delay += 0) + 'ms">';
    h += '  <div class="avatar-wrap">';
    h += '    <div class="avatar-ring"><img src="' + esc(c.foto) + '" alt="' + esc(c.nome) + '"></div>';
    h += '    <span class="online-dot"></span>';
    h += '  </div>';
    h += '  <h1>' + esc(c.nome);
    h += '    <span class="badge-verified"><svg viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';
    h += '  </h1>';
    h += '  <p class="tagline">' + esc(c.descricao) + '</p>';
    h += '</div>';

    // Prova social
    if (c.provaSocial) {
      h += '<div class="social-proof anim" style="animation-delay:' + (delay += 80) + 'ms">';
      h += '  <span class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</span>';
      h += '  <span>' + esc(c.provaSocial) + '</span>';
      h += '</div>';
    }

    // Oferta
    if (c.ofertaTitulo) {
      h += '<div class="offer anim" style="animation-delay:' + (delay += 80) + 'ms">';
      h += '  <div class="offer-top">';
      if (c.ofertaBadge) h += '<span class="offer-badge">' + esc(c.ofertaBadge) + '</span>';
      h += '    <span class="offer-timer">&#128308; Encerra em breve</span>';
      h += '  </div>';
      h += '  <h2>' + esc(c.ofertaTitulo) + '</h2>';
      h += '  <p class="offer-sub">' + esc(c.ofertaDescricao) + '</p>';
      if (c.ofertaPrecoAntigo || c.ofertaPrecoNovo) {
        h += '  <div class="price-row">';
        if (c.ofertaPrecoAntigo) h += '<span class="price-old">' + esc(c.ofertaPrecoAntigo) + '</span>';
        if (c.ofertaPrecoNovo)   h += '<span class="price-new">' + esc(c.ofertaPrecoNovo) + '</span>';
        h += '  </div>';
      }
      h += '  <a href="' + esc(c.ofertaLink) + '" class="btn-offer" data-track="oferta-principal" target="_blank" rel="noopener">';
      h += '    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>';
      h += '    ' + esc(c.ofertaBotao);
      h += '  </a>';
      h += '</div>';
    }

    // Botoes
    var currentSection = null;
    var linksOpen = false;

    c.botoes.forEach(function(btn) {
      // Nova secao?
      if (btn.secao && btn.secao !== currentSection) {
        if (linksOpen) h += '</div>';
        h += '<div class="section-label anim" style="animation-delay:' + (delay += 60) + 'ms">' + esc(btn.secao) + '</div>';
        h += '<div class="links">';
        linksOpen = true;
        currentSection = btn.secao;
      } else if (!linksOpen) {
        h += '<div class="links">';
        linksOpen = true;
      }

      var trackId = slugify(btn.nome);
      var colors = ICON_COLORS[btn.icone] || ICON_COLORS.site;

      h += '<a href="' + esc(btn.link) + '" class="link-btn' + (btn.destaque ? ' highlight' : '') + ' anim" data-track="' + trackId + '" style="animation-delay:' + (delay += 60) + 'ms" target="_blank" rel="noopener">';
      h += '  <span class="link-icon" style="background:' + colors.bg + '">';
      h += '    <svg viewBox="0 0 24 24" style="fill:' + colors.fill + '">' + (ICONS[btn.icone] || ICONS.site) + '</svg>';
      h += '  </span>';
      h += '  <span class="link-info">';
      h += '    <span class="link-name">' + esc(btn.nome) + '</span>';
      if (btn.sub) h += '<span class="link-sub">' + esc(btn.sub) + '</span>';
      h += '  </span>';

      if (btn.badge) {
        h += '<span class="link-badge ' + (btn.badgeCor || 'roxo') + '">' + esc(btn.badge) + '</span>';
      } else {
        h += '<svg class="link-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>';
      }

      h += '</a>';
    });

    if (linksOpen) h += '</div>';

    // Rodape
    h += '<footer class="anim" style="animation-delay:' + (delay += 80) + 'ms">';
    h += '  <div class="social-icons">';

    var redes = c.redesSociais || {};
    var redesList = ['instagram', 'youtube', 'tiktok', 'whatsapp', 'telegram', 'email'];
    redesList.forEach(function(r) {
      if (redes[r]) {
        var href = r === 'email' ? 'mailto:' + redes[r] : redes[r];
        h += '<a href="' + esc(href) + '" data-track="social-' + r + '" target="_blank" rel="noopener" aria-label="' + r + '">';
        h += '  <svg viewBox="0 0 24 24">' + ICONS[r] + '</svg>';
        h += '</a>';
      }
    });

    h += '  </div>';
    if (c.rodape) h += '<span class="footer-text">&copy; ' + esc(c.rodape) + '</span>';
    h += '</footer>';

    document.getElementById('app').innerHTML = h;
  }

  // ---- Helpers ----
  function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
  function slugify(s) { return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
  function setMeta(prop, val) {
    var el = document.querySelector('meta[property="' + prop + '"], meta[name="' + prop + '"]');
    if (el) el.setAttribute('content', val);
  }

  // ========== ANALYTICS ==========

  function getData() {
    try { return JSON.parse(localStorage.getItem('bp_data') || '{}'); } catch(e) { return {}; }
  }
  function saveData(d) {
    try { localStorage.setItem('bp_data', JSON.stringify(d)); } catch(e) {}
  }

  // Registrar visita
  var data = getData();
  data.views = (data.views || 0) + 1;
  data.clicks = data.clicks || {};
  data.lastVisit = new Date().toISOString();
  saveData(data);

  // Rastrear cliques
  document.addEventListener('click', function(e) {
    var el = e.target.closest('[data-track]');
    if (!el) return;
    var id = el.getAttribute('data-track');
    var d = getData();
    d.clicks[id] = (d.clicks[id] || 0) + 1;
    saveData(d);

    // Google Analytics 4
    if (typeof gtag === 'function') {
      gtag('event', 'link_click', { event_category: 'biopage', event_label: id, link_url: el.href });
    }
    // Meta Pixel
    if (typeof fbq === 'function') {
      fbq('trackCustom', 'LinkClick', { link_name: id, link_url: el.href });
    }
  });

  // Painel admin
  function openPanel() {
    var d = getData();
    var views = d.views || 0;
    var clicks = d.clicks || {};
    var total = 0;

    for (var k in clicks) if (clicks.hasOwnProperty(k)) total += clicks[k];

    document.getElementById('sViews').textContent = views.toLocaleString('pt-BR');
    document.getElementById('sClicks').textContent = total.toLocaleString('pt-BR');
    document.getElementById('sCTR').textContent = views > 0 ? (total / views * 100).toFixed(1) + '%' : '0%';

    // Coletar todos os links rastreavies da pagina
    var tracked = document.querySelectorAll('[data-track]');
    var items = [];
    var seen = {};
    tracked.forEach(function(el) {
      var id = el.getAttribute('data-track');
      if (seen[id]) return;
      seen[id] = true;
      var label = el.querySelector('.link-name, .btn-offer');
      items.push({
        id: id,
        label: label ? label.textContent.trim() : id,
        count: clicks[id] || 0
      });
    });

    items.sort(function(a, b) { return b.count - a.count; });
    var max = items.length > 0 ? Math.max(items[0].count, 1) : 1;

    var tbody = document.getElementById('tblBody');
    tbody.innerHTML = '';
    items.forEach(function(item) {
      var pct = total > 0 ? (item.count / total * 100).toFixed(1) : '0.0';
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="tn">' + esc(item.label) +
        '<div class="bar-wrap"><div class="bar-fill" style="width:' + (item.count / max * 100) + '%"></div></div></td>' +
        '<td class="tc">' + item.count + '</td>' +
        '<td class="tp">' + pct + '%</td>';
      tbody.appendChild(tr);
    });

    document.getElementById('panelOverlay').classList.add('open');
  }

  // Botoes do painel
  document.getElementById('btnClose').addEventListener('click', function() {
    document.getElementById('panelOverlay').classList.remove('open');
  });

  document.getElementById('btnReset').addEventListener('click', function() {
    if (confirm('Tem certeza que deseja zerar todos os dados?')) {
      localStorage.removeItem('bp_data');
      openPanel();
    }
  });

  document.getElementById('btnCSV').addEventListener('click', function() {
    var d = getData();
    var clicks = d.clicks || {};
    var csv = 'Link,Cliques\n';
    var tracked = document.querySelectorAll('[data-track]');
    var seen = {};
    tracked.forEach(function(el) {
      var id = el.getAttribute('data-track');
      if (seen[id]) return;
      seen[id] = true;
      var label = el.querySelector('.link-name, .btn-offer');
      csv += (label ? label.textContent.trim() : id) + ',' + (clicks[id] || 0) + '\n';
    });
    csv += '\nVisitas Totais,' + (d.views || 0) + '\n';
    csv += 'Ultima Visita,' + (d.lastVisit || '-') + '\n';

    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'analytics_' + new Date().toISOString().slice(0, 10) + '.csv';
    a.click();
  });

  // ---- Inicializar ----
  render();
  if (window.location.search.indexOf('admin') !== -1) openPanel();

})();
</script>
